name: Sync LeetCode

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 6"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Fetch and organize
        env:
          LEETCODE_SESSION: ${{ secrets.LEETCODE_SESSION }}
          LEETCODE_CSRF_TOKEN: ${{ secrets.LEETCODE_CSRF_TOKEN }}
        run: |
          node << 'SCRIPT'
          const https = require("https");
          const fs = require("fs");
          const path = require("path");

          const SESSION = process.env.LEETCODE_SESSION;
          const CSRF = process.env.LEETCODE_CSRF_TOKEN;

          const LANG_META = {
            python:     { folder: "Python",     ext: "py"    },
            python3:    { folder: "Python",     ext: "py"    },
            cpp:        { folder: "Cpp",        ext: "cpp"   },
            c:          { folder: "C",          ext: "c"     },
            java:       { folder: "Java",       ext: "java"  },
            javascript: { folder: "JavaScript", ext: "js"    },
            typescript: { folder: "TypeScript", ext: "ts"    },
            csharp:     { folder: "CSharp",     ext: "cs"    },
            go:         { folder: "Go",         ext: "go"    },
            rust:       { folder: "Rust",       ext: "rs"    },
            kotlin:     { folder: "Kotlin",     ext: "kt"    },
            swift:      { folder: "Swift",      ext: "swift" },
            ruby:       { folder: "Ruby",       ext: "rb"    },
            scala:      { folder: "Scala",      ext: "scala" },
            php:        { folder: "PHP",        ext: "php"   },
            bash:       { folder: "Shell",      ext: "sh"    },
            mysql:      { folder: "SQL",        ext: "sql"   },
            mssql:      { folder: "SQL",        ext: "sql"   },
            oraclesql:  { folder: "SQL",        ext: "sql"   },
            dart:       { folder: "Dart",       ext: "dart"  },
            r:          { folder: "R",          ext: "r"     },
            elixir:     { folder: "Elixir",     ext: "ex"    },
            erlang:     { folder: "Erlang",     ext: "erl"   },
            racket:     { folder: "Racket",     ext: "rkt"   },
          };

          function get(url) {
            return new Promise((resolve, reject) => {
              const opts = {
                headers: {
                  cookie: `LEETCODE_SESSION=${SESSION}; csrftoken=${CSRF}`,
                  "user-agent": "Mozilla/5.0",
                },
              };
              https.get(url, opts, (res) => {
                let data = "";
                res.on("data", (c) => (data += c));
                res.on("end", () => {
                  try { resolve(JSON.parse(data)); }
                  catch { resolve(null); }
                });
              }).on("error", reject);
            });
          }

          function sleep(ms) {
            return new Promise((r) => setTimeout(r, ms));
          }

          function sanitize(title) {
            return title.replace(/[^a-zA-Z0-9\-_ ]/g, "").trim().replace(/\s+/g, "_");
          }

          async function fetchAll() {
            const all = [];
            let offset = 0;
            while (true) {
              const data = await get(
                `https://leetcode.com/api/submissions/?offset=${offset}&limit=20&lastkey=`
              );
              if (!data) break;
              const batch = (data.submissions_dump || []).filter(
                (s) => s.status_display === "Accepted"
              );
              all.push(...batch);
              console.log(`offset ${offset} — total so far: ${all.length}`);
              if (!data.has_next) break;
              offset += 20;
              await sleep(700);
            }
            return all;
          }

          (async () => {
            const raw = await fetchAll();
            if (!raw.length) {
              console.error("No submissions fetched — aborting.");
              process.exit(1);
            }

            const seen = new Map();
            for (const s of raw) {
              const key = `${s.title_slug}_${s.lang}`;
              if (!seen.has(key)) seen.set(key, s);
            }
            const unique = [...seen.values()];
            console.log(`Unique submissions: ${unique.length}`);

            const newFiles = {};

            for (const s of unique) {
              const meta = LANG_META[s.lang] || { folder: "Other", ext: "txt" };
              fs.mkdirSync(meta.folder, { recursive: true });

              const safe = sanitize(s.title);
              const filename = `${safe}.${meta.ext}`;
              const filepath = path.join(meta.folder, filename);

              const detail = await get(`https://leetcode.com/api/submissions/${s.id}/`);
              const code = (detail && detail.code) ? detail.code : (s.code || "");
              await sleep(600);

              fs.writeFileSync(filepath, code, "utf8");

              if (!newFiles[meta.folder]) newFiles[meta.folder] = [];
              newFiles[meta.folder].push({ filename, title: s.title, slug: s.title_slug });
            }

            const total = unique.length;
            const sorted = Object.entries(newFiles).sort((a, b) => b[1].length - a[1].length);

            let readme = `# LEETCODE-V-VAULT\n\n`;
            readme += `![Problems](https://img.shields.io/badge/Solved-${total}-00ff88?style=for-the-badge&labelColor=0d1117) `;
            readme += `![Languages](https://img.shields.io/badge/Languages-${sorted.length}-00ccff?style=for-the-badge&labelColor=0d1117)\n\n`;
            readme += `---\n\n`;
            readme += `## Structure\n\n`;
            readme += "```\n";
            readme += "LEETCODE-V-VAULT/\n";
            for (const [lang, files] of sorted) {
              readme += `├── ${lang}/  (${files.length} solutions)\n`;
            }
            readme += "```\n\n";
            readme += `---\n\n`;
            readme += `## Solutions by Language\n\n`;

            for (const [lang, files] of sorted) {
              readme += `<details>\n<summary><strong>${lang}</strong> — ${files.length} solutions</summary>\n\n`;
              readme += `| # | Problem | File |\n`;
              readme += `|---|---------|------|\n`;
              files.forEach((f, i) => {
                readme += `| ${i + 1} | [${f.title}](https://leetcode.com/problems/${f.slug}/) | [View](./${lang}/${f.filename}) |\n`;
              });
              readme += `\n</details>\n\n`;
            }

            readme += `---\n\n*Auto-synced with GitHub Actions*\n`;

            fs.writeFileSync("README.md", readme, "utf8");
            console.log("README.md written.");
          })();
          SCRIPT

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Sync LeetCode solutions organized by language"
          git push
